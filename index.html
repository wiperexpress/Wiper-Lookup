<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiper Express — Fitment Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showRecommended": true,
  "accent": "#0057FF",
  "density": "regular",
  "shopifyDomain": "autotexwipers.com",
  "shopifyLinksEnabled": true
}/*EDITMODE-END*/;

// Shopify SKU → handle lookup. Populated from data/shopify-skus.json.
// shopifyUrlFor(sku) returns:
//   • https://<domain>/products/<handle>   when sku is mapped
//   • https://<domain>/search?q=<sku>      as fallback (Path C)
//   • null                                  when links are disabled or sku is empty
window.__SKU_MAP = {};
window.__SKU_MAP_LOADED = false;
window.shopifyUrlFor = function(sku) {
  if (!sku) return null;
  const t = window.TWEAK_DEFAULTS || {};
  if (!t.shopifyLinksEnabled) return null;
  const domain = (t.shopifyDomain || 'autotexwipers.com').replace(/^https?:\/\//, '').replace(/\/$/, '');
  const s = String(sku);
  const M = window.__SKU_MAP || {};
  // Try the SKU exactly, upper/lower-cased, and with dot↔dash swaps
  // (Shopify exports mix both, e.g. "4812.R172D.E1" vs "4812-R172D-E1").
  // Then try common pack-size suffixes ("-6", "-10", "B-10") because many
  // Autotex wiper SKUs are sold as boxed multi-packs on Shopify.
  const base = [s, s.toUpperCase(), s.toLowerCase()];
  const withDotDash = [];
  for (const v of base) {
    withDotDash.push(v, v.replace(/\./g, '-'), v.replace(/-/g, '.'));
  }
  const suffixes = ['', '-6', '-10', 'B-10', '-B-10', 'A-10', '-A-10'];
  for (const v of withDotDash) {
    for (const suf of suffixes) {
      const k = v + suf;
      if (M[k]) return { url: `https://${domain}/products/${M[k]}`, mapped: true };
    }
  }
  return { url: `https://${domain}/search?q=${encodeURIComponent(s)}`, mapped: false };
};
fetch('data/shopify-skus.json')
  .then(r => r.json())
  .then(j => {
    // strip underscore-prefixed metadata keys
    const map = {};
    for (const k of Object.keys(j)) if (!k.startsWith('_')) map[k] = j[k];
    window.__SKU_MAP = map;
    window.__SKU_MAP_LOADED = true;
    window.dispatchEvent(new Event('sku-map-loaded'));
  })
  .catch(() => { window.__SKU_MAP_LOADED = true; });
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; color: #1A1A1A; background: #F7F7F7; }
  code { font-family: 'DM Mono', ui-monospace, monospace; }
  button:focus-visible, input:focus-visible { outline: 2px solid #0057FF; outline-offset: 1px; }
  ::selection { background: #B3CAFF; color: #00247A; }
  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #EDEDED; border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: #AAAAAA; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="results.jsx"></script>
<script type="text/babel" src="composition.jsx"></script>
<script type="text/babel">
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
